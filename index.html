<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keren — Permis</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@300;400;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #08060E;
      --bg2:      #0E0A19;
      --surface:  #120E1D;
      --surface2: #19132A;
      --v:        #7C3AED;
      --vl:       #A78BFA;
      --vll:      #C4B5FD;
      --r:        #BE185D;
      --rl:       #EC4899;
      --rll:      #F9A8D4;
      --text:     #F0EBFF;
      --text2:    #B8AAD4;
      --muted:    #6B5C82;
      --border:   rgba(167,139,250,0.12);
      --border2:  rgba(167,139,250,0.25);
      --ok:       #10B981;
      --bad:      #F43F5E;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    .title { font-family: 'Josefin Sans', sans-serif; }

    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.028;
    }

    .gv { position:fixed; width:700px; height:700px; border-radius:50%; background:radial-gradient(circle,rgba(124,58,237,0.11) 0%,transparent 70%); pointer-events:none; z-index:0; top:-250px; left:-200px; }
    .gr { position:fixed; width:550px; height:550px; border-radius:50%; background:radial-gradient(circle,rgba(190,24,93,0.09) 0%,transparent 70%); pointer-events:none; z-index:0; bottom:-180px; right:-150px; }

    .tl { background:linear-gradient(90deg,transparent,var(--v),var(--rl),var(--v),transparent); height:1px; }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(124,58,237,0.07);
    }

    .pb { background:rgba(255,255,255,0.06); border-radius:999px; height:2px; overflow:hidden; }
    .pf {
      background: linear-gradient(90deg, var(--v), var(--rl));
      border-radius:999px; height:100%;
      transition: width .55s cubic-bezier(.4,0,.2,1);
    }

    .opt {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 20px;
      cursor: pointer;
      transition: background .15s, border-color .15s, transform .15s;
      width: 100%;
      color: var(--text2);
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      line-height: 1.55;
      display: flex;
      align-items: center;
      gap: 12px;
      text-align: left;
    }
    .opt:hover:not(:disabled) {
      background: rgba(124,58,237,0.1);
      border-color: rgba(167,139,250,0.3);
      transform: translateX(3px);
      color: var(--text);
    }
    .opt.correct { background:rgba(16,185,129,0.08); border-color:rgba(16,185,129,0.35); color:var(--text); }
    .opt.sel-w   { background:rgba(244,63,94,0.08); border-color:rgba(244,63,94,0.35); color:var(--text); }
    .opt.dimmed  { opacity:0.28; }

    .lbadge {
      width:26px; height:26px; min-width:26px; border-radius:6px;
      background:rgba(167,139,250,0.1); color:var(--vl);
      display:flex; align-items:center; justify-content:center;
      font-family:'Josefin Sans',sans-serif; font-weight:700; font-size:12px;
      flex-shrink:0;
      transition: background .15s, color .15s;
    }
    .opt.correct .lbadge { background:rgba(16,185,129,0.2); color:#10B981; }
    .opt.sel-w .lbadge { background:rgba(244,63,94,0.2); color:#F43F5E; }

    .cat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px 20px;
      cursor: pointer;
      transition: background .2s, border-color .2s, transform .22s, box-shadow .22s;
      text-align: center;
      position: relative;
      overflow: hidden;
      font: inherit;
      color: inherit;
    }
    .cat-card::before {
      content:'';
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:2px;
      background:linear-gradient(90deg, var(--v), var(--rl));
      opacity:0;
      transition:opacity .22s;
    }
    .cat-card:hover {
      background:var(--surface2);
      border-color:var(--border2);
      transform:translateY(-4px);
      box-shadow:0 18px 48px rgba(124,58,237,0.13);
    }
    .cat-card:hover::before { opacity:1; }
    .cat-card:focus-visible, .fc:focus-visible, .btn:focus-visible, .nav-btn:focus-visible, .pill:focus-visible {
      outline: 2px solid var(--vl);
      outline-offset: 3px;
    }

    .btn {
      border:none;
      border-radius:10px;
      padding:12px 28px;
      font-family:'Josefin Sans',sans-serif;
      font-weight:600;
      font-size:13px;
      cursor:pointer;
      letter-spacing:.08em;
      text-transform:uppercase;
      transition: transform .15s, box-shadow .15s;
    }
    .btn:hover { transform:translateY(-2px); }
    .btn:active { transform:translateY(0); }
    .btn-v { background:linear-gradient(135deg,var(--v),#6D28D9); color:#fff; }
    .btn-v:hover { box-shadow:0 8px 28px rgba(124,58,237,0.4); }
    .btn-g { background:transparent; border:1px solid var(--border2); color:var(--text2); }
    .btn-g:hover { background:rgba(167,139,250,0.07); color:var(--text); }

    .expl { border-radius:12px; padding:14px 18px; animation:fu .35s ease; }
    .expl-ok  { background:rgba(16,185,129,0.07); border:1px solid rgba(16,185,129,0.2); }
    .expl-bad { background:rgba(244,63,94,0.07); border:1px solid rgba(244,63,94,0.2); }

    .tg { background:linear-gradient(135deg,var(--vl),var(--rll)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }

    .sring { width:148px; height:148px; border-radius:50%; display:flex; align-items:center; justify-content:center; position:relative; }
    .sring svg { position:absolute; inset:0; transform:rotate(-90deg); }

    .stat { background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:12px; padding:16px; text-align:center; }

    .tag {
      display:inline-flex;
      align-items:center;
      padding:2px 10px;
      border-radius:4px;
      font-size:10px;
      font-family:'Josefin Sans',sans-serif;
      font-weight:700;
      letter-spacing:.08em;
      text-transform:uppercase;
      background:rgba(167,139,250,0.1);
      border:1px solid rgba(167,139,250,0.2);
      color:var(--vl);
    }

    .ritem { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:14px; padding:16px; transition:background .15s; }
    .ritem:hover { background:rgba(167,139,250,0.04); }
    .rok { border-left:2px solid #10B981; }
    .rbad { border-left:2px solid #F43F5E; }

    .dv { height:1px; background:linear-gradient(90deg,transparent,var(--border2),transparent); }

    @keyframes fu { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    @keyframes sr { from{opacity:0;transform:translateX(22px)} to{opacity:1;transform:translateX(0)} }
    .afu { animation:fu .45s ease both; }
    .asr { animation:sr .4s ease both; }
    .d1{animation-delay:.07s} .d2{animation-delay:.14s} .d3{animation-delay:.21s}
    .d4{animation-delay:.28s} .d5{animation-delay:.35s} .d6{animation-delay:.42s}

    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:rgba(167,139,250,0.18); border-radius:2px; }

    .fc-wrap { perspective: 1200px; width:100%; }
    .fc {
      width:100%;
      min-height:300px;
      position:relative;
      transform-style:preserve-3d;
      transition: transform .6s cubic-bezier(.4,0,.2,1);
      cursor: pointer;
    }
    .fc.flipped { transform: rotateY(180deg); }
    .fc-face {
      position:absolute;
      inset:0;
      backface-visibility:hidden;
      -webkit-backface-visibility:hidden;
      border-radius:20px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:36px 32px;
      text-align:center;
    }
    .fc-front {
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: 0 8px 40px rgba(124,58,237,0.08);
    }
    .fc-back {
      background: var(--surface2);
      border: 1px solid var(--border2);
      transform: rotateY(180deg);
      box-shadow: 0 8px 40px rgba(190,24,93,0.10);
    }
    .fc-hint {
      position:absolute;
      bottom:14px;
      left:0;
      right:0;
      text-align:center;
      font-size:10px;
      letter-spacing:.1em;
      text-transform:uppercase;
      color:var(--muted);
      font-family:'Josefin Sans',sans-serif;
    }

    .pill {
      padding:5px 14px;
      border-radius:999px;
      border:1px solid var(--border);
      background:transparent;
      color:var(--muted);
      cursor:pointer;
      font-family:'Josefin Sans',sans-serif;
      font-size:10px;
      font-weight:700;
      letter-spacing:.07em;
      text-transform:uppercase;
      transition: background .15s, border-color .15s, color .15s;
      white-space:nowrap;
    }
    .pill.active { background:rgba(167,139,250,0.15); border-color:var(--border2); color:var(--vl); }
    .pill:hover:not(.active) { background:rgba(255,255,255,0.04); color:var(--text2); }

    .btn-ok  { background:rgba(16,185,129,0.12); border:1px solid rgba(16,185,129,0.3); color:#10B981; }
    .btn-ok:hover  { background:rgba(16,185,129,0.2); box-shadow:0 6px 20px rgba(16,185,129,0.2); }
    .btn-rev { background:rgba(244,63,94,0.1); border:1px solid rgba(244,63,94,0.3); color:#F43F5E; }
    .btn-rev:hover { background:rgba(244,63,94,0.18); box-shadow:0 6px 20px rgba(244,63,94,0.2); }

    .nav-btn {
      width:44px;
      height:44px;
      border-radius:12px;
      border:1px solid var(--border);
      background:rgba(255,255,255,0.03);
      color:var(--text2);
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      transition: background .15s, border-color .15s, color .15s;
      flex-shrink:0;
    }
    .nav-btn:hover:not(:disabled) { background:rgba(167,139,250,0.1); border-color:var(--border2); color:var(--text); }
    .nav-btn:disabled { opacity:.25; cursor:default; }
  </style>
</head>

  { id: 'qser', sourceType: 'QSER',         name: 'Sécurité routière',          color: '#34D399', desc: 'Règles, prévention et comportements à adopter',            quizEligible: true  },

const CATEGORY_BY_SOURCE = {
  VI: 'vi',
  VE: 've',
  QSER: 'qser',
  '1ers secours': 'seco',
};

function shuffle(arr, rand = Math.random) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(rand() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function createSeededRandom(seed) {
  let value = seed >>> 0;
  return () => {
    value = (value * 1664525 + 1013904223) >>> 0;
    return value / 4294967296;
  };
}

function stripCitations(text) {
  return text.replace(/\[cite_start\]|\[cite:[^\]]+\]/g, '');
}

function normalizeText(text) {
  return stripCitations(text)
    .replace(/\*\*/g, '')
    .replace(/\*/g, '')
    .replace(/\s+/g, ' ')
    .trim();
}

function normalizeKey(text) {
  return normalizeText(text)
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g, '')
    .replace(/[']/g, '\'')
    .replace(/[“”«»]/g, '"')
    .replace(/…/g, '...')
    .toLowerCase();
}

function getCategories(questions) {
  return CATEGORY_META.map(meta => ({
    ...meta,
    count: meta.id === 'all'
      ? questions.length
      : questions.filter(question => question.cat === meta.id).length,
  }));
}

function getCategory(catId, categories) {
  return categories.find(category => category.id === catId) || categories[0];
}

function filterQuestions(questions, catId) {
  return catId === 'all'
    ? questions
    : questions.filter(question => question.cat === catId);
}

function answerSignature(text) {
  const t = text.trim();
  const firstWord = t.split(/\s+/)[0].toLowerCase().replace(/[^a-z]/g, '');
  const dashCount = (t.match(/[–\-]/g) || []).length;
  const hasNumbers = /\d/.test(t);
  const lenBucket = t.length < 60 ? 'short' : t.length < 180 ? 'medium' : 'long';
  const isListy = dashCount >= 2 || (t.match(/\./g) || []).length >= 2;
  return { firstWord, isListy, hasNumbers, lenBucket };
}

function signatureScore(a, b) {
  const sa = answerSignature(a);
  const sb = answerSignature(b);
  let score = 0;
  if (sa.firstWord === sb.firstWord) score += 5;
  if (sa.isListy === sb.isListy) score += 3;
  if (sa.hasNumbers === sb.hasNumbers) score += 2;
  if (sa.lenBucket === sb.lenBucket) score += 1;
  return score;
}

function wordSet(text) {
  return new Set(normalizeKey(text).split(/\s+/).filter(w => w.length > 3));
}

function jaccardSimilarity(a, b) {
  const sa = wordSet(a);
  const sb = wordSet(b);
  if (sa.size === 0 && sb.size === 0) return 1;
  let inter = 0;
  for (const w of sa) if (sb.has(w)) inter++;
  const union = sa.size + sb.size - inter;
  return union === 0 ? 0 : inter / union;
}

function pickDistractors(entry, entries) {
  const rng = createSeededRandom(entry.sourceNumber * 97 + entry.sourceType.length * 17);
  const seenKeys = new Set([normalizeKey(entry.answer)]);

  const candidates = entries.filter(c => c.id !== entry.id && c.answer);

  const scored = candidates.map(c => ({
    answer: c.answer,
    score: (c.sourceType === entry.sourceType ? 4 : 0) + signatureScore(entry.answer, c.answer) + rng() * 1.5,
  }));

  scored.sort((a, b) => b.score - a.score);

  const distractors = [];
  for (const { answer } of scored) {
    if (distractors.length >= 3) break;
    const key = normalizeKey(answer);
    if (seenKeys.has(key)) continue;
    // Reject near-duplicates: too similar to correct answer or already chosen distractors
    const tooSimilar = jaccardSimilarity(entry.answer, answer) > 0.65
      || distractors.some(d => jaccardSimilarity(d, answer) > 0.65);
    if (tooSimilar) continue;
    seenKeys.add(key);
    distractors.push(answer);
  }
  return distractors;
}

function parseQuestionsMarkdown(markdown) {
  const entries = [];
  const blocks = [...markdown.matchAll(/### Question\s+(\d+)([\s\S]*?)(?=\n### Question\s+\d+|$)/g)];

  blocks.forEach(([, questionNumber, body]) => {
    const lines = body
      .split('\n')
      .map(line => line.trim())
      .filter(Boolean);

    lines.forEach(line => {
      const match = line.match(/^\*\s*(?:\[cite_start\])?\*\*(VI|VE|QSER|1ers secours)\s*:?\*\*\s*(.+)$/);
      if (!match) return;

      const sourceType = match[1];
      const sourceBody = stripCitations(match[2]).trim();
      const [rawQuestion, ...rawAnswerParts] = sourceBody.split(/\s*➔\s*/);
      const question = normalizeText(rawQuestion);
      const hasExplicitAnswer = rawAnswerParts.length > 0;
      const answer = normalizeText(rawAnswerParts.join(' ➔ ')) || question;

      if (!question) return;

      const sourceNumber = Number(questionNumber);

      entries.push({
        id: `${sourceType}-${questionNumber}-${entries.length + 1}`,
        cat: CATEGORY_BY_SOURCE[sourceType],
        q: question,
        answer,
        ex: answer,
        hasExplicitAnswer,
        sourceType,
        sourceNumber,
        sourceLabel: `Question ${questionNumber} • ${sourceType}`,
      });
    });
  });

  return entries.map((entry, index, allEntries) => {
    const options = shuffle(
      [entry.answer, ...pickDistractors(entry, allEntries)],
      createSeededRandom(entry.sourceNumber * 131 + entry.sourceType.length * 29 + index)
    );

    return {
      ...entry,
      opts: options,
      c: options.findIndex(option => option === entry.answer),
    };
  });
}

function decodeEmbeddedQuestions() {
  try {
    return decodeURIComponent(escape(window.atob(EMBEDDED_QUESTIONS_MD_BASE64)));
  } catch (error) {
    throw new Error(`La copie embarquée de ${SOURCE_FILE} est invalide.`);
  }
}

async function readQuestionsFile() {
  const sourceUrl = new URL(SOURCE_FILE, window.location.href).href;
  const embeddedText = decodeEmbeddedQuestions();

  const fetchText = async () => {
    const response = await fetch(sourceUrl, { cache: 'no-store' });
    if (!response.ok) {
      throw new Error(`Impossible de charger ${SOURCE_FILE} (${response.status}).`);
    }
    return response.text();
  };

  if (window.location.protocol === 'file:') {
    return embeddedText;
  }

  try {
    return await fetchText();
  } catch (error) {
    return embeddedText;
  }
}

function readSavedProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return { known: [], review: [] };
    const parsed = JSON.parse(raw);
    return {
      known: Array.isArray(parsed.known) ? parsed.known : [],
      review: Array.isArray(parsed.review) ? parsed.review : [],
    };
  } catch {
    return { known: [], review: [] };
  }
}

function ScoreRing({ score, total }) {
  const pct = total > 0 ? score / total : 0;
  const radius = 58;
  const circumference = 2 * Math.PI * radius;
  const dash = circumference * pct;
  const color = pct >= 0.8 ? '#10B981' : pct >= 0.5 ? '#F59E0B' : '#F43F5E';

  return (
    <div className="sring mx-auto">
      <svg viewBox="0 0 128 128" width="148" height="148">
        <circle cx="64" cy="64" r={radius} fill="none" stroke="rgba(167,139,250,0.1)" strokeWidth="8" />
        <circle
          cx="64"
          cy="64"
          r={radius}
          fill="none"
          stroke={color}
          strokeWidth="8"
          strokeDasharray={`${dash} ${circumference}`}
          strokeLinecap="round"
          style={{ transition: 'stroke-dasharray 1.1s ease', transform: 'rotate(-90deg)', transformOrigin: 'center' }}
        />
      </svg>
      <div style={{ position: 'relative', zIndex: 1, textAlign: 'center' }}>
        <div className="title" style={{ fontSize: '2.5rem', fontWeight: 700, color, lineHeight: 1 }}>{score}</div>
        <div style={{ fontSize: '11px', color: 'var(--muted)', fontFamily: 'DM Sans' }}>/{total}</div>
      </div>
    </div>
  );
}

function FlashcardScreen({ questions, categories, onHome }) {
  const savedProgress = readSavedProgress();
  const [catFilter, setCatFilter] = useState('all');
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [known, setKnown] = useState(() => new Set(savedProgress.known));
  const [toReview, setToReview] = useState(() => new Set(savedProgress.review));

  useEffect(() => {
    try {
      localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify({
          known: [...known],
          review: [...toReview],
        })
      );
    } catch {}
  }, [known, toReview]);

  const deck = filterQuestions(questions, catFilter);
  const card = deck[idx] || null;
  const category = card ? getCategory(card.cat, categories) : getCategory(catFilter, categories);
  const deckIds = new Set(deck.map(item => item.id));
  const knownCount = [...known].filter(id => deckIds.has(id)).length;
  const reviewCount = [...toReview].filter(id => deckIds.has(id)).length;
  const total = deck.length;
  const unseenCount = Math.max(total - knownCount - reviewCount, 0);
  const pct = total > 0 ? Math.round((knownCount / total) * 100) : 0;

  const go = direction => {
    setFlipped(false);
    setTimeout(() => {
      setIdx(current => Math.max(0, Math.min(total - 1, current + direction)));
    }, flipped ? 320 : 0);
  };

  const mark = type => {
    if (!card) return;

    if (type === 'known') {
      setKnown(current => new Set([...current, card.id]));
      setToReview(current => {
        const next = new Set(current);
        next.delete(card.id);
        return next;
      });
    } else {
      setToReview(current => new Set([...current, card.id]));
      setKnown(current => {
        const next = new Set(current);
        next.delete(card.id);
        return next;
      });
    }

    if (idx < total - 1) go(1);
  };

  const handleCatChange = id => {
    setCatFilter(id);
    setIdx(0);
    setFlipped(false);
  };

  const resetProgress = () => {
    setKnown(new Set());
    setToReview(new Set());
  };

  return (
    <div style={{ minHeight: '100vh', position: 'relative', zIndex: 1 }}>
      <div className="tl" />
      <nav style={{ padding: '16px 28px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>

          ← Accueil
        </button>
        <span className="title" style={{ fontWeight: 600, fontSize: 13, letterSpacing: '.12em', textTransform: 'uppercase', color: 'var(--text)' }}>
          Flashcards
        </span>
        <div className="tag">{knownCount} / {total} sus</div>
      </nav>

      <div style={{ maxWidth: 680, margin: '0 auto', padding: '8px 24px 60px', textAlign: 'center' }}>
        <div style={{ display: 'flex', gap: 7, overflowX: 'auto', paddingBottom: 4, marginBottom: 28, justifyContent: 'center', flexWrap: 'wrap' }}>
          {categories.map(categoryItem => (
            <button
              key={categoryItem.id}
              className={`pill ${catFilter === categoryItem.id ? 'active' : ''}`}
              onClick={() => handleCatChange(categoryItem.id)}
            >
              {categoryItem.id === 'all' ? 'Tout' : categoryItem.name}
            </button>
          ))}
        </div>

        <div style={{ marginBottom: 20 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 6 }}>
            <span style={{ fontSize: 10, color: 'var(--muted)', letterSpacing: '.07em', textTransform: 'uppercase', fontFamily: 'Josefin Sans' }}>
              Progression
            </span>
            <span style={{ fontSize: 10, color: 'var(--vl)', fontFamily: 'Josefin Sans', fontWeight: 700, letterSpacing: '.04em' }}>
              {pct}%
            </span>
          </div>
          <div className="pb" style={{ height: 3 }}>
            <div className="pf" style={{ width: `${pct}%` }} />
          </div>
        </div>

        <div style={{ display: 'flex', justifyContent: 'center', gap: 20, marginBottom: 24, flexWrap: 'wrap' }}>
          <span style={{ fontSize: 11, color: '#10B981', fontFamily: 'Josefin Sans', fontWeight: 700, letterSpacing: '.06em', textTransform: 'uppercase' }}>
            {knownCount} sus
          </span>
          <span style={{ fontSize: 11, color: 'var(--muted)', fontFamily: 'Josefin Sans', letterSpacing: '.06em' }}>·</span>
          <span style={{ fontSize: 11, color: '#F43F5E', fontFamily: 'Josefin Sans', fontWeight: 700, letterSpacing: '.06em', textTransform: 'uppercase' }}>
            {reviewCount} à revoir

            {unseenCount} non vues
          </span>
        </div>

        {card && (
          <div className="fc-wrap" style={{ marginBottom: 20 }}>
            <button
              type="button"
              className={`fc ${flipped ? 'flipped' : ''}`}
              onClick={() => setFlipped(current => !current)}
              style={{
                minHeight: flipped ? '420px' : '300px',
                border: 'none',

            >

                <div
                  style={{

                    fontWeight: 700,

                    textTransform: 'uppercase',
                    color: category?.color || 'var(--vl)',
                    background: `${category?.color || '#7C3AED'}14`,

                <p style={{ fontSize: 13, lineHeight: 1.65, color: 'var(--text2)', textAlign: 'center', whiteSpace: 'pre-line' }}>
                  {card.ex}
                </p>
              </div>
            </button>
          </div>
        )}

        <div
          style={{
            display: 'flex',
            gap: 10,
            justifyContent: 'center',
            marginBottom: 24,
            opacity: flipped ? 1 : 0,
            transform: flipped ? 'translateY(0)' : 'translateY(8px)',

            pointerEvents: flipped ? 'auto' : 'none',
          }}
        >
          <button className="btn btn-rev" style={{ flex: 1, maxWidth: 180 }} onClick={() => mark('review')}>

  );
}

          <button className="cat-card" onClick={() => onStart('all')} style={{ border: 'none' }}>
            <div style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--vl)', margin: '0 auto 10px' }} />
            <div className="title" style={{ fontWeight: 700, fontSize: 13, letterSpacing: '.08em', textTransform: 'uppercase', color: 'var(--text)', marginBottom: 5 }}>
              Mode Quiz
            </div>
            <p style={{ fontSize: 11.5, color: 'var(--muted)', lineHeight: 1.5 }}>QCM — sécurité routière &amp; premiers secours</p>
          </button>
          <button className="cat-card" onClick={onFlashcards} style={{ border: 'none' }}>
            <div style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--rl)', margin: '0 auto 10px' }} />
            <div className="title" style={{ fontWeight: 700, fontSize: 13, letterSpacing: '.08em', textTransform: 'uppercase', color: 'var(--text)', marginBottom: 5 }}>
              Flashcards
            </div>
            <p style={{ fontSize: 11.5, color: 'var(--muted)', lineHeight: 1.5 }}>Révision carte par carte, avec progression sauvegardée</p>
          </button>
        </div>

        <div className="dv afu d3" style={{ marginBottom: 36 }} />

        <p className="afu d3" style={{ fontSize: 10, color: 'var(--muted)', letterSpacing: '.12em', textTransform: 'uppercase', marginBottom: 22 }}>
          Quiz — par rubrique
        </p>

        <div style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', gap: 12, marginBottom: 40 }}>
          {categories.filter(c => c.quizEligible).map((category, index) => (
            <button
              key={category.id}
              className="cat-card afu"
              style={{ animationDelay: `${0.1 + index * 0.06}s`, border: 'none', flex: '0 1 220px', width: 'min(100%, 220px)' }}
              onClick={() => onStart(category.id)}
            >
              <div style={{ width: 8, height: 8, borderRadius: '50%', background: category.color, margin: '0 auto 12px' }} />
              <div className="title" style={{ fontWeight: 600, fontSize: 13, letterSpacing: '.08em', textTransform: 'uppercase', color: 'var(--text)', marginBottom: 7 }}>
                {category.name}
              </div>
              <p style={{ fontSize: 11.5, color: 'var(--muted)', lineHeight: 1.55, marginBottom: 14 }}>{category.desc}</p>
              <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: '.08em', textTransform: 'uppercase', color: category.color, background: `${category.color}14`, border: `1px solid ${category.color}28`, padding: '2px 9px', borderRadius: 4, display: 'inline-block' }}>
                {category.count} Q
              </span>
            </button>
          ))}
        </div>

        <div className="dv afu" style={{ marginBottom: 36, animationDelay: '.5s' }} />

        <p className="afu" style={{ fontSize: 10, color: 'var(--muted)', letterSpacing: '.12em', textTransform: 'uppercase', marginBottom: 8, animationDelay: '.55s' }}>
          Vérifications véhicule — Flashcards seulement
        </p>
        <p className="afu" style={{ fontSize: 12, color: 'var(--muted)', marginBottom: 22, animationDelay: '.57s', lineHeight: 1.5 }}>
          Ces consignes sont pratiques (montrer une commande, indiquer un emplacement) — elles ne fonctionnent pas en QCM.
        </p>

        <div style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', gap: 12 }}>
          {categories.filter(c => c.id !== 'all' && !c.quizEligible).map((category, index) => (
            <button
              key={category.id}
              className="cat-card afu"
              style={{ animationDelay: `${0.6 + index * 0.06}s`, border: 'none', flex: '0 1 220px', width: 'min(100%, 220px)', opacity: 0.75 }}
              onClick={onFlashcards}
            >
              <div style={{ width: 8, height: 8, borderRadius: '50%', background: category.color, margin: '0 auto 12px' }} />
              <div className="title" style={{ fontWeight: 600, fontSize: 13, letterSpacing: '.08em', textTransform: 'uppercase', color: 'var(--text)', marginBottom: 7 }}>
                {category.name}
              </div>
              <p style={{ fontSize: 11.5, color: 'var(--muted)', lineHeight: 1.55, marginBottom: 14 }}>{category.desc}</p>
              <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: '.08em', textTransform: 'uppercase', color: 'var(--rl)', background: 'rgba(236,72,153,0.1)', border: '1px solid rgba(236,72,153,0.25)', padding: '2px 9px', borderRadius: 4, display: 'inline-block' }}>
                Flashcards
              </span>
            </button>
          ))}
        </div>

        <p className="afu" style={{ fontSize: 10.5, color: 'var(--muted)', marginTop: 44, animationDelay: '.7s', letterSpacing: '.04em' }}>
          Banque complète intégrée au site, sans contenu parallèle.
        </p>
      </div>
    </div>
  );
}

function QuizScreen({ categories, questions, idx, onAnswer, onNext, onHome, selected, showEx, score }) {
  const question = questions[idx];
  const total = questions.length;
  const category = getCategory(question.cat, categories);

  return (
    <div style={{ minHeight: '100vh', position: 'relative', zIndex: 1 }}>
      <div className="tl" />
      <div style={{ padding: '16px 28px', maxWidth: 700, margin: '0 auto' }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 16, marginBottom: 10, flexWrap: 'wrap' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <button className="btn btn-g" style={{ padding: '8px 14px', fontSize: 11 }} onClick={onHome}>
              ← Accueil
            </button>
            <span style={{ width: 7, height: 7, borderRadius: '50%', background: category.color, display: 'inline-block' }} />
            <span className="title" style={{ fontSize: 11, color: 'var(--muted)', letterSpacing: '.1em', textTransform: 'uppercase', fontWeight: 600 }}>
              {category.name}
            </span>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
            <span className="title" style={{ fontSize: 13, color: 'var(--vl)', fontWeight: 600, letterSpacing: '.04em' }}>{score} pts</span>
            <div className="tag">{idx + 1} / {total}</div>
          </div>
        </div>
        <div className="pb">
          <div className="pf" style={{ width: `${((idx + 1) / total) * 100}%` }} />
        </div>
      </div>

      <div key={question.id} style={{ maxWidth: 700, margin: '0 auto', padding: '10px 28px 48px' }}>
        <div className="card asr" style={{ padding: '28px 28px 24px', textAlign: 'center' }}>
          <div style={{ marginBottom: 22 }}>
            <div
              style={{
                display: 'inline-block',
                marginBottom: 10,
                fontSize: 10,
                fontWeight: 700,
                letterSpacing: '.1em',
                textTransform: 'uppercase',
                color: category.color,
                background: `${category.color}14`,
                border: `1px solid ${category.color}25`,
                padding: '3px 12px',
                borderRadius: 4,
                fontFamily: 'Josefin Sans',
              }}
            >
              {question.sourceLabel}
            </div>
            <div style={{ fontSize: 10, color: 'var(--muted)', letterSpacing: '.09em', textTransform: 'uppercase', marginBottom: 16, fontFamily: 'Josefin Sans' }}>
              Question {idx + 1} du quiz
            </div>
            <h2 className="title" style={{ fontSize: 'clamp(15px,2.8vw,18px)', fontWeight: 600, lineHeight: 1.5, color: 'var(--text)', letterSpacing: '.01em' }}>
              {question.q}
            </h2>
          </div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 9, marginBottom: showEx ? 20 : 0, textAlign: 'left' }}>
            {question.opts.map((option, optionIndex) => {
              let className = 'opt';
              if (showEx) {
                if (optionIndex === question.c) className += ' correct';
                else if (optionIndex === selected && selected !== question.c) className += ' sel-w';
                else className += ' dimmed';
              }

              return (
                <button key={optionIndex} className={className} disabled={showEx} onClick={() => !showEx && onAnswer(optionIndex)}>
                  <span className="lbadge">{LETTERS[optionIndex]}</span>
                  <span style={{ flex: 1 }}>{option}</span>
                  {showEx && optionIndex === question.c && <IconOk />}
                  {showEx && optionIndex === selected && selected !== question.c && <IconBad />}
                </button>
              );
            })}
          </div>

          {showEx && (
            <div className={`expl ${selected === question.c ? 'expl-ok' : 'expl-bad'}`} style={{ textAlign: 'left' }}>
              <div style={{ display: 'flex', gap: 9 }}>
                <div style={{ marginTop: 1, flexShrink: 0 }}>{selected === question.c ? <IconOk /> : <IconBad />}</div>
                <div>
                  <div className="title" style={{ fontWeight: 700, fontSize: 11, marginBottom: 5, letterSpacing: '.08em', textTransform: 'uppercase', color: selected === question.c ? '#10B981' : '#F43F5E' }}>
                    {selected === question.c
                      ? (question.hasExplicitAnswer ? 'Bonne réponse' : 'Consigne identifiée')
                      : (question.hasExplicitAnswer ? 'Réponse attendue' : 'Consigne officielle')}
                  </div>
                  <p style={{ fontSize: 13, lineHeight: 1.65, color: 'var(--text2)', margin: 0, whiteSpace: 'pre-line' }}>{question.ex}</p>
                </div>
              </div>
            </div>
          )}
        </div>

        {showEx && (
          <div className="afu" style={{ marginTop: 14, display: 'flex', justifyContent: 'center' }}>
            <button className="btn btn-v" onClick={onNext} style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              {idx + 1 < total ? 'Suivant' : 'Voir les résultats'}
              <IconArr />
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

function ResultsScreen({ categories, score, questions, answers, onRestart, onHome }) {
  const total = questions.length;
  const pct = total > 0 ? Math.round((score / total) * 100) : 0;
  const [reviewOpen, setReviewOpen] = useState(false);

  const verdict = pct >= 80
    ? 'Très solide.'
    : pct >= 60
      ? 'La base est là, mais certaines réponses restent à consolider.'
      : 'Une nouvelle passe de révision sera utile.';

  const color = pct >= 80 ? '#10B981' : pct >= 60 ? '#F59E0B' : '#F43F5E';

  return (
    <div style={{ minHeight: '100vh', position: 'relative', zIndex: 1 }}>
      <div className="tl" />
      <div style={{ maxWidth: 700, margin: '0 auto', padding: '36px 28px 60px', textAlign: 'center' }}>
        <div className="afu" style={{ marginBottom: 28 }}>
          <div style={{ display: 'inline-block', width: 36, height: 2, background: 'linear-gradient(90deg,var(--v),var(--rl))', borderRadius: 2, marginBottom: 16 }} />
          <h1 className="title" style={{ fontSize: 'clamp(2rem,5vw,3rem)', fontWeight: 700, marginBottom: 8, letterSpacing: '.04em', textTransform: 'uppercase' }}>
            Résultats
          </h1>
          <p style={{ color: 'var(--text2)', fontSize: 14 }}>{verdict}</p>
        </div>

        <div className="card afu d1" style={{ padding: '28px', marginBottom: 14 }}>
          <ScoreRing score={score} total={total} />
          <div style={{ marginTop: 12, marginBottom: 26 }}>
            <div className="title" style={{ fontSize: '2.8rem', fontWeight: 700, color, lineHeight: 1 }}>{pct}%</div>
            <div style={{ color: 'var(--muted)', fontSize: 11, marginTop: 4, letterSpacing: '.08em', textTransform: 'uppercase' }}>de réussite</div>
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 10 }}>
            {[
              ['Correctes', score, '#10B981'],
              ['Incorrectes', total - score, '#F43F5E'],
              ['Total', total, 'var(--vl)'],
            ].map(([label, value, statColor]) => (
              <div key={label} className="stat">
                <div className="title" style={{ fontSize: '1.8rem', fontWeight: 700, color: statColor, lineHeight: 1 }}>{value}</div>
                <div style={{ fontSize: 10, color: 'var(--muted)', marginTop: 4, letterSpacing: '.07em', textTransform: 'uppercase' }}>{label}</div>
              </div>
            ))}
          </div>
        </div>

        <div className="afu d2" style={{ display: 'flex', gap: 10, marginBottom: 20, justifyContent: 'center', flexWrap: 'wrap' }}>
          <button className="btn btn-v" style={{ minWidth: 140 }} onClick={onRestart}>Recommencer</button>
          <button className="btn btn-g" style={{ minWidth: 140 }} onClick={onHome}>Accueil</button>
        </div>

        <button className="btn btn-g afu d3" style={{ width: '100%', marginBottom: reviewOpen ? 16 : 0 }} onClick={() => setReviewOpen(current => !current)}>
          {reviewOpen ? 'Masquer le détail' : 'Voir toutes les réponses'}
        </button>

        {reviewOpen && (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 9, marginTop: 4, textAlign: 'left' }}>
            {questions.map((question, index) => {
              const answerIndex = answers[index];
              const isCorrect = answerIndex === question.c;
              const category = getCategory(question.cat, categories);

              return (
                <div key={question.id} className={`ritem afu ${isCorrect ? 'rok' : 'rbad'}`} style={{ animationDelay: `${index * 0.03}s` }}>
                  <div style={{ display: 'flex', gap: 10 }}>
                    <div style={{ marginTop: 2, flexShrink: 0 }}>{isCorrect ? <IconOk /> : <IconBad />}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 7, marginBottom: 6, flexWrap: 'wrap' }}>
                        <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: '.07em', textTransform: 'uppercase', color: category.color, background: `${category.color}14`, border: `1px solid ${category.color}25`, padding: '2px 8px', borderRadius: 3, fontFamily: 'Josefin Sans' }}>
                          {category.name}
                        </span>
                        <span style={{ fontSize: 9, color: 'var(--muted)', letterSpacing: '.04em', textTransform: 'uppercase', fontFamily: 'Josefin Sans' }}>
                          {question.sourceLabel}
                        </span>
                        {!isCorrect && (
                          <span style={{ fontSize: 9, color: '#F43F5E', background: 'rgba(244,63,94,0.08)', border: '1px solid rgba(244,63,94,0.2)', padding: '2px 8px', borderRadius: 3, fontWeight: 700, letterSpacing: '.04em', fontFamily: 'Josefin Sans' }}>
                            {LETTERS[answerIndex]} — {question.opts[answerIndex]}
                          </span>
                        )}
                      </div>
                      <p className="title" style={{ fontSize: 13.5, fontWeight: 600, color: 'var(--text)', marginBottom: 5, lineHeight: 1.4 }}>{question.q}</p>
                      <p style={{ fontSize: 12, color: '#10B981', marginBottom: isCorrect ? 0 : 5 }}>
                        {LETTERS[question.c]}. {question.opts[question.c]}
                      </p>
                      {!isCorrect && (
                        <p style={{ fontSize: 12, color: 'var(--text2)', lineHeight: 1.6, marginTop: 6, paddingTop: 6, borderTop: '1px solid var(--border)', whiteSpace: 'pre-line' }}>
                          {question.ex}
                        </p>
                      )}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [bank, setBank] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState('');
  const [reloadToken, setReloadToken] = useState(0);

  const [view, setView] = useState('home');
  const [questions, setQuestions] = useState([]);
  const [idx, setIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [showEx, setShowEx] = useState(false);
  const [answers, setAnswers] = useState([]);
  const [score, setScore] = useState(0);
  const [lastCat, setLastCat] = useState('all');

  useEffect(() => {
    let cancelled = false;

    const load = async () => {
      setLoading(true);
      setError('');

      try {
        const markdown = await readQuestionsFile();
        const parsedQuestions = parseQuestionsMarkdown(markdown);

        if (!parsedQuestions.length) {
          throw new Error("Aucune question exploitable n'a été trouvée dans les données du site.");
        }

        if (!cancelled) {
          setBank(parsedQuestions);
          setLoading(false);
        }
      } catch (loadError) {
        if (!cancelled) {
          setError(loadError instanceof Error ? loadError.message : 'Lecture impossible des données du site.');
          setLoading(false);
        }
      }
    };

    load();

    return () => {
      cancelled = true;
    };
  }, [reloadToken]);

  const categories = getCategories(bank);

  const start = useCallback(catId => {
    const base = catId === 'all' ? bank : filterQuestions(bank, catId);
    const pool = base.filter(q => QUIZ_CATS.has(q.cat));
    const quizQuestions = shuffle(pool);

    setQuestions(quizQuestions);
    setIdx(0);
    setSelected(null);
    setShowEx(false);
    setAnswers([]);
    setScore(0);
    setLastCat(catId);
    setView('quiz');
  }, [bank]);

  const answer = useCallback(optionIndex => {
    setSelected(optionIndex);
    setShowEx(true);
    if (questions[idx].c === optionIndex) {
      setScore(current => current + 1);
    }
    setAnswers(current => [...current, optionIndex]);
  }, [questions, idx]);

  const next = useCallback(() => {
    if (idx + 1 >= questions.length) {
      setView('results');
      return;
    }
    setIdx(current => current + 1);
    setSelected(null);
    setShowEx(false);
  }, [idx, questions.length]);

  if (loading) {
    return <LoadingScreen />;
  }

  if (error) {
    return <ErrorScreen message={error} onRetry={() => setReloadToken(current => current + 1)} />;
  }

  if (view === 'home') {
    return <HomePage categories={categories} totalQuestions={bank.length} onStart={start} onFlashcards={() => setView('flashcards')} />;
  }

  if (view === 'flashcards') {
    return <FlashcardScreen questions={bank} categories={categories} onHome={() => setView('home')} />;
  }

  if (view === 'quiz' && questions.length > 0) {
    return (
      <QuizScreen
        categories={categories}
        questions={questions}
        idx={idx}
        onAnswer={answer}
        onNext={next}
        onHome={() => setView('home')}
        selected={selected}
        showEx={showEx}
        score={score}
      />
    );
  }

  if (view === 'results') {
    return (
      <ResultsScreen
        categories={categories}
        score={score}
        questions={questions}
        answers={answers}
        onRestart={() => start(lastCat)}
        onHome={() => setView('home')}
      />
    );
  }

  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
